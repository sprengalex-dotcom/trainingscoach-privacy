<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHOOP Verbindung – Mein Trainingscoach</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 24px;
      color: #1a1a1a;
      line-height: 1.6;
    }
    .box {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 20px 24px;
      margin-top: 24px;
    }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fca5a5;
    }
    code {
      display: block;
      background: #1a1a1a;
      color: #4ade80;
      padding: 14px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      word-break: break-all;
      margin-top: 12px;
      cursor: pointer;
    }
    button {
      margin-top: 12px;
      padding: 8px 18px;
      background: #16a34a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #15803d; }
    p { color: #555; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>WHOOP Autorisierung</h1>
  <div id="result"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const container = document.getElementById('result');

    if (code) {
      container.innerHTML = `
        <div class="box">
          <strong>Autorisierung erfolgreich!</strong>
          <p>Kopiere diesen Code und füge ihn in dein Terminal / Python-Skript ein:</p>
          <code id="code">${code}</code>
          <br>
          <button onclick="copy()">Code kopieren</button>
        </div>
        <p style="margin-top:16px;font-size:0.85rem;color:#888;">
          Dieser Code ist nur einmal verwendbar. Schließe das Fenster danach.
        </p>`;
    } else if (error) {
      container.innerHTML = `
        <div class="box error-box">
          <strong>Fehler:</strong> ${error}<br>
          <p>${params.get('error_description') || 'Bitte versuche die Autorisierung erneut.'}</p>
        </div>`;
    } else {
      container.innerHTML = `
        <div class="box error-box">
          <strong>Kein Code gefunden.</strong>
          <p>Diese Seite ist nur nach einer WHOOP-Autorisierung gültig.</p>
        </div>`;
    }

    function copy() {
      navigator.clipboard.writeText(document.getElementById('code').textContent);
      document.querySelector('button').textContent = 'Kopiert!';
    }
  </script>
</body>
</html>
